<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceInk 字幕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', 'Noto Sans TC', sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .subtitle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 16px 24px;
      background-color: rgba(0, 0, 0, 0.85);
      border-radius: 8px;
    }

    .subtitle-text {
      color: #ffffff;
      font-size: 24px;
      font-weight: 500;
      text-align: center;
      line-height: 1.5;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }

    /* 拖動手柄指示 */
    .drag-indicator {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .subtitle-container:hover .drag-indicator {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="subtitle-container">
    <div class="drag-indicator"></div>
    <p id="subtitleText" class="subtitle-text">準備中...</p>
  </div>

  <script>
    const subtitleText = document.getElementById('subtitleText')

    // 監聽字幕更新
    window.electronAPI.subtitle.onTextUpdate((text) => {
      subtitleText.textContent = text || '...'
    })
  </script>
</body>
</html>
